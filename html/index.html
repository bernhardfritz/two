<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Renderer</title>
</head>
<body>
  <div id="app"></div>
  <script src="wasm_exec.js"></script>
  <script src="app.js"></script>
  <script src="renderer.js"></script>
	<script type="module">
    const appEl = document.getElementById("app");
    const canvasEl = document.createElement("canvas");
    canvasEl.style.width = '100%';
    canvasEl.style.height = '100%';
    canvasEl.style.display = 'block';
    appEl.appendChild(canvasEl);
    if ('OffscreenCanvas' in window && 'Worker' in window && 'ResizeObserver' in window) {
      const canvas = canvasEl.transferControlToOffscreen();
      const worker = new Worker('worker.js');
      worker.postMessage({ type: 'canvas', canvas }, [canvas]);
      const observer = new ResizeObserver(() => {
        worker.postMessage({ type: 'resize', clientWidth: canvasEl.clientWidth, clientHeight: canvasEl.clientHeight, devicePixelRatio: window.devicePixelRatio });
      });
      observer.observe(canvasEl);
    } else {
      app(canvasEl, renderer);      
    }
	</script>
</body>
</html>
