name: CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: tinygo/tinygo:0.40.1
      options: --user 1001
    steps:
      - uses: actions/checkout@v6
      - name: Build wasm
        run: cp /usr/local/tinygo/targets/wasm_exec.js ./examples/bunnymark/public/ && GOOS=js GOARCH=wasm tinygo build -o examples/bunnymark/public/main.wasm --no-debug ./examples/bunnymark/main.go
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci && npm run build && npm --prefix ./examples/bunnymark/ ci
      - name: Bundle js
        run: npm --prefix ./examples/bunnymark/ run build -- --base=/two/
      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Build output to publish to the `gh-pages` branch:
          publish_dir: ./examples/bunnymark/dist/
          # The following lines assign commit authorship to the official
          # GH-Actions bot for deploys to `gh-pages` branch:
          # https://github.com/actions/checkout/issues/13#issuecomment-724415212
          # The GH actions bot is used by default if you didn't specify the two fields.
          # You can swap them out with your own user credentials.
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com